<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<!-- ⭐ 這行超重要，不然RWD不會動 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Exercise 27</title>

<style>
body{
    background-color: #6ea0d1;
    padding: 40px;
}

/* 外框 */
.container{
    width: 300px;
    margin: auto;
    background-color: #f5f5f5;
    padding: 10px;
    border-radius: 10px;
}

/* 共用 */
.box{
    margin: 5px;
}

/* 上面 */
.header{
    height: 80px;
    background-color: #a8c95a;
}

/* 中間（三格） */
.middle{
    display: flex;
}

.middle .box{
    flex: 1;
    height: 80px;
    background-color: #5fa8b8;
}

/* 下面（四格） */
.footer{
    display: flex;
}

.footer .box{
    flex: 1;
    height: 60px;
    background-color: #ddd;
}

/* ⭐ 手機版（小於480px） */
@media (max-width: 480px){

    /* 中間變直排 */
    .middle{
        flex-direction: column;
    }

    /* 下面變兩欄 */
    .footer{
        flex-wrap: wrap;
    }

    .footer .box{
        width: 48%;
    }
}
</style>

</head>

<body>

<div class="container">

    <div class="header box"></div>

    <div class="middle">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>

    <div class="footer">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>

</div>

</body>
</html>
