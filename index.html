<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Exercise 27</title>

<style>
body{
    background: #6ea0d1;
    padding: 30px;
}

/* ⭐ 修正：不要固定太小 */
.container{
    width: 90%;
    max-width: 800px;
    margin: auto;
    background: #f5f5f5;
    padding: 10px;
    border-radius: 10px;
}

/* 上面 */
.header{
    height: 80px;
    background: #a8c95a;
    margin: 5px;
}

/* 中間 */
.middle{
    display: flex;
}

.middle div{
    flex: 1;
    height: 80px;
    background: #5fa8b8;
    margin: 5px;
}

/* ⭐ 大螢幕 footer */
.footer{
    display: flex;
    flex-wrap: nowrap;   /* 一排4個 */
}

.footer div{
    flex: 1;
    height: 60px;
    background: #ddd;
    margin: 5px;
}

/* ⭐ RWD（小於480px） */
@media (max-width: 480px){

    /* 中間變直排 */
    .middle{
        flex-direction: column;
    }

    /* 下面變兩欄 */
    .footer{
        flex-wrap: wrap;
    }

    .footer div{
        width: 48%;
    }
}
</style>

</head>

<body>

<div class="container">

    <div class="header"></div>

    <div class="middle">
        <div></div>
        <div></div>
        <div></div>
    </div>

    <div class="footer">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>

</div>

</body>
</html>
